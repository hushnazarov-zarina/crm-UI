services:
  - type: web
    name: billur-erp-api
    env: node
    plan: starter
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npm run build && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://billur-erp.onrender.com,https://app.andbillur.com
      - key: DATABASE_URL
        fromDatabase:
          name: billur-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: QR_SECRET
        generateValue: true

  - type: web
    name: billur-erp-web
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://billur-erp-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: billur-erp-db
    plan: starter
    region: frankfurt
    postgresMajorVersion: 16
